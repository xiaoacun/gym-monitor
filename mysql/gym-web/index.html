    .time-slot.booked { background: #ecf0f1; border-color: #e74c3c; opacity: .6; cursor: not-allowed; }
    .time-slot.booked:hover { transform: none; border-color: #e74c3c; }

    .slot-status { font-size: 12px; color: #7f8c8d; }

    .peak { color: #e74c3c; font-weight: bold; }

    .booking-time { font-size: 14px; color: #666; margin-top: 4px; }
    .no-data { text-align: center; color: #999; padding: 30px; }

  </style>
</head>

          </div>

  <script>
    const FIXED_TIME_SLOTS = [
      { id:1, time:'09:00-10:00', start:'09:00', end:'10:00' },
      { id:2, time:'10:00-11:00', start:'10:00', end:'11:00' },
      { id:3, time:'11:00-12:00', start:'11:00', end:'12:00' },
      { id:4, time:'12:00-13:00', start:'12:00', end:'13:00' },
      { id:5, time:'13:00-14:00', start:'13:00', end:'14:00' },
      { id:6, time:'14:00-15:00', start:'14:00', end:'15:00' },
      { id:7, time:'15:00-16:00', start:'15:00', end:'16:00' },
      { id:8, time:'16:00-17:00', start:'16:00', end:'17:00' },
      { id:9, time:'17:00-18:00', start:'17:00', end:'18:00' },
      { id:10, time:'18:00-19:00', start:'18:00', end:'19:00' },
      { id:11, time:'19:00-20:00', start:'19:00', end:'20:00' },
      { id:12, time:'20:00-21:00', start:'20:00', end:'21:00' }
    ];

    let supabaseClient = null;
    let currentUser = null;
    let selectedEquipment = null;
    let selectedSlot = null;
    let peopleChart = null;
    let equipmentChart = null;
    let refreshTimer = null;

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function initSupabase() {
      const url = localStorage.getItem('supabase_url');
      const key = localStorage.getItem('supabase_key');
      if (url && key) {
        try {
          supabaseClient = window.supabase.createClient(url, key);
          return true;
        } catch (e) {
          console.error('Supabase init error:', e);
          return false;
        }
      }
      return false;
    }

    function loadConfig() {
      document.getElementById('cfg-supabase-url').value = localStorage.getItem('supabase_url') || '';
      document.getElementById('cfg-supabase-key').value = localStorage.getItem('supabase_key') || '';
    }

    function saveConfig() {
      const url = document.getElementById('cfg-supabase-url').value.trim();
      const key = document.getElementById('cfg-supabase-key').value.trim();
      if (!url || !key) {
        document.getElementById('configMessage').innerHTML = '<span style="color:#e74c3c;">璇峰～鍐欏畬鏁寸殑 URL 鍜?Key</span>';
        return;
      }
      localStorage.setItem('supabase_url', url);
      localStorage.setItem('supabase_key', key);
      initSupabase();
      document.getElementById('configMessage').innerHTML = '<span style="color:#27ae60;">鉁?閰嶇疆宸蹭繚瀛?/span>';
    }

    async function testConnection() {
      if (!initSupabase()) {
        document.getElementById('configMessage').innerHTML = '<span style="color:#e74c3c;">鉂?璇峰厛濉啓骞朵繚瀛橀厤缃?/span>';
        return;
      }
      try {
        const { data, error } = await supabaseClient.from('gym_status').select('*').limit(1);
        if (error) throw error;
        document.getElementById('configMessage').innerHTML = '<span style="color:#27ae60;">鉁?杩炴帴鎴愬姛锛佹暟鎹簱鍙闂?/span>';
      } catch (e) {
        document.getElementById('configMessage').innerHTML = `<span style="color:#e74c3c;">鉂?杩炴帴澶辫触: ${e.message}</span>`;
      }
    }

    function showLogin() {
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('registerPage').classList.add('hidden');
      document.getElementById('appLayout').classList.remove('active');
    }

    function showRegister() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('registerPage').classList.remove('hidden');
      document.getElementById('appLayout').classList.remove('active');
    }

    function showApp() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('registerPage').classList.add('hidden');
      document.getElementById('appLayout').classList.add('active');
      document.getElementById('sidebarUsername').textContent = currentUser.username;
      document.getElementById('sidebarRole').textContent = currentUser.role === 'admin' ? '绠＄悊鍛? : '鏅€氱敤鎴?;
      if (currentUser.role === 'admin') {
        document.getElementById('nav-admin-li').classList.remove('hidden');
      } else {
        document.getElementById('nav-admin-li').classList.add('hidden');
      }
      loadConfig();
      navigate('dashboard');
      startAutoRefresh();
    }

    function logout() {
      currentUser = null;
      if (refreshTimer) clearInterval(refreshTimer);
      showLogin();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!initSupabase()) {
        document.getElementById('loginMessage').className = 'message error';
        document.getElementById('loginMessage').textContent = '璇峰厛鍦ㄧ郴缁熻缃腑閰嶇疆 Supabase 杩炴帴';
        setTimeout(() => navigate('settings'), 0);
        currentUser = { username: '__setup__', role: 'admin' };
        showApp();
        return;
      }

      try {
        const { data, error } = await supabaseClient.from('gym_users').select('*').eq('username', username).single();
        if (error || !data) {
          document.getElementById('loginMessage').className = 'message error';
          document.getElementById('loginMessage').textContent = '鐢ㄦ埛涓嶅瓨鍦紝璇峰厛娉ㄥ唽';
          return;
        }
        const hashed = await sha256(password);
        if (hashed !== data.password) {
          document.getElementById('loginMessage').className = 'message error';
          document.getElementById('loginMessage').textContent = '瀵嗙爜閿欒';
          return;
        }
        currentUser = { id: data.id, username: data.username, role: data.role };
        document.getElementById('loginMessage').className = 'message success';
        document.getElementById('loginMessage').textContent = '鐧诲綍鎴愬姛锛?;
        setTimeout(() => showApp(), 500);
      } catch (err) {
        document.getElementById('loginMessage').className = 'message error';
        document.getElementById('loginMessage').textContent = '鐧诲綍澶辫触: ' + err.message;
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;
      const phone = document.getElementById('regPhone').value.trim();
      const email = document.getElementById('regEmail').value.trim();

      if (password !== password2) {
        document.getElementById('registerMessage').className = 'message error';
        document.getElementById('registerMessage').textContent = '涓ゆ杈撳叆鐨勫瘑鐮佷笉涓€鑷?;
        return;
      }

      if (!initSupabase()) {
        document.getElementById('registerMessage').className = 'message error';
        document.getElementById('registerMessage').textContent = '璇峰厛閰嶇疆 Supabase 杩炴帴';
        return;
      }

      try {
        const { data: existing } = await supabaseClient.from('gym_users').select('id').eq('username', username).single();
        if (existing) {
          document.getElementById('registerMessage').className = 'message error';
          document.getElementById('registerMessage').textContent = '鐢ㄦ埛鍚嶅凡瀛樺湪';
          return;
        }

        const hashed = await sha256(password);
        const { error } = await supabaseClient.from('gym_users').insert({
          username, password: hashed, phone: phone || null, email: email || null, role: 'user'
        });
        if (error) throw error;

        document.getElementById('registerMessage').className = 'message success';
        document.getElementById('registerMessage').textContent = '娉ㄥ唽鎴愬姛锛佸嵆灏嗚烦杞埌鐧诲綍椤甸潰...';
        document.getElementById('registerForm').reset();
        setTimeout(() => showLogin(), 2000);
      } catch (err) {
        document.getElementById('registerMessage').className = 'message error';
        document.getElementById('registerMessage').textContent = '娉ㄥ唽澶辫触: ' + err.message;
      }
    });

    function navigate(page) {
      document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.sidebar-menu a').forEach(el => el.classList.remove('active'));
      const pageEl = document.getElementById('page-' + page);
      const navEl = document.getElementById('nav-' + page);
      if (pageEl) pageEl.classList.remove('hidden');
      if (navEl) navEl.classList.add('active');

      if (page === 'dashboard') loadDashboard();
      if (page === 'booking') initBookingPage();
      if (page === 'analytics') loadAnalytics();
      if (page === 'history') loadHistory();
      if (page === 'admin') { loadAdminBookings(); loadAdminUsers(); }
    }

    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(() => {
        const activePage = document.querySelector('.page-content:not(.hidden)');
        if (activePage) {
          const id = activePage.id.replace('page-', '');
          if (id === 'dashboard') loadDashboard();
        }
      }, 5000);
    }

    async function loadDashboard() {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient.from('gym_status').select('*').order('update_time', { ascending: false }).limit(1).single();
        if (error && error.code !== 'PGRST116') throw error;
        if (data) {
          document.getElementById('d-currentPeople').textContent = data.current_people ?? '--';
          document.getElementById('d-maxPeople').textContent = data.max_people ?? '--';
          document.getElementById('d-temperature').textContent = data.temperature !== null ? data.temperature + '鈩? : '--';
          document.getElementById('d-humidity').textContent = data.humidity !== null ? data.humidity + '%' : '--';
          const eq1 = document.getElementById('d-equipment1');
          eq1.textContent = data.equipment1 ? '鍗犵敤' : '绌洪棽';
          eq1.className = 'stat-value ' + (data.equipment1 ? 'status-on' : 'status-off');
          const eq2 = document.getElementById('d-equipment2');
          eq2.textContent = data.equipment2 ? '鍗犵敤' : '绌洪棽';
          eq2.className = 'stat-value ' + (data.equipment2 ? 'status-on' : 'status-off');
          document.getElementById('d-eq1Count').textContent = data.equipment1_count ?? '--';
          document.getElementById('d-eq2Count').textContent = data.equipment2_count ?? '--';
          const ut = data.update_time ? new Date(data.update_time).toLocaleString('zh-CN') : '--';
          document.getElementById('d-updateTime').textContent = ut;
        }
      } catch (e) { console.error('Load dashboard error:', e); }

      try {
        const { data } = await supabaseClient.from('gym_bookings').select('*').eq('username', currentUser.username).in('status', ['confirmed', 'pending']).order('booking_date', { ascending: true });
        const listEl = document.getElementById('d-myBookings');
        if (!data || data.length === 0) {
          listEl.innerHTML = '<div class="no-data">鏆傛棤棰勭害璁板綍</div>';
        } else {
          listEl.innerHTML = data.map(b => `
            <div class="booking-item">
              <div>
                <div class="booking-equipment">鍣ㄦ${b.equipment_id}</div>
                <div class="booking-time">鈴?${b.start_time ? b.start_time.substring(0,5) : '--'} - ${b.end_time ? b.end_time.substring(0,5) : '--'}</div>
                <div style="font-size:12px;color:#999;">馃搮 ${b.booking_date}</div>
              </div>
              <button class="btn btn-red btn-sm" onclick="cancelBooking(${b.id})">鍙栨秷</button>
            </div>
          `).join('');
        }
      } catch (e) { console.error('Load my bookings error:', e); }
    }

    async function cancelBooking(bookingId) {
      if (!confirm('纭畾瑕佸彇娑堣繖涓绾﹀悧锛?)) return;
      try {
        const { error } = await supabaseClient.from('gym_bookings').update({ status: 'cancelled' }).eq('id', bookingId);
        if (error) throw error;
        alert('棰勭害宸插彇娑?);
        loadDashboard();
      } catch (e) { alert('鍙栨秷澶辫触: ' + e.message); }
    }

    function initBookingPage() {
      const now = new Date();
      const today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
      const dateInput = document.getElementById('bookingDate');
      dateInput.min = today;
      if (!dateInput.value) dateInput.value = today;
      const maxDate = new Date(); maxDate.setDate(now.getDate() + 30);
      dateInput.max = maxDate.getFullYear() + '-' + String(maxDate.getMonth()+1).padStart(2,'0') + '-' + String(maxDate.getDate()).padStart(2,'0');
      renderTimeSlots();
      selectedEquipment = null;
      selectedSlot = null;
      document.querySelectorAll('.equipment-option').forEach(el => el.classList.remove('selected'));
      updateSubmitBtn();
    }

    function renderTimeSlots() {
      const container = document.getElementById('timeSlots');
      container.innerHTML = FIXED_TIME_SLOTS.map(s => `
        <div class="time-slot" id="slot-${s.id}" onclick="selectTimeSlot(${s.id})">
          <div class="slot-time">${s.time}</div>
          <div class="slot-status">鉁?鍙绾?/div>
        </div>
      `).join('');
    }

    function selectEquipment(eq) {
      selectedEquipment = eq;
      document.querySelectorAll('.equipment-option').forEach(el => el.classList.remove('selected'));
      document.getElementById('eq-opt-' + eq).classList.add('selected');
      checkBookings();
      updateSubmitBtn();
    }

    function selectTimeSlot(id) {
      const slotEl = document.getElementById('slot-' + id);
      if (slotEl.classList.contains('booked')) return;
      selectedSlot = FIXED_TIME_SLOTS.find(s => s.id === id);
      document.querySelectorAll('.time-slot').forEach(el => {
        el.classList.remove('selected');
        const st = el.querySelector('.slot-status');
        if (st && !el.classList.contains('booked')) st.textContent = '鉁?鍙绾?;
      });
      slotEl.classList.add('selected');
      slotEl.querySelector('.slot-status').textContent = '鉁?宸查€夋嫨';
      updateSubmitBtn();
    }

    async function checkBookings() {
      if (!selectedEquipment || !supabaseClient) return;
      const bookingDate = document.getElementById('bookingDate').value;
      if (!bookingDate) return;
      try {
        const { data } = await supabaseClient.from('gym_bookings').select('start_time,end_time,username').eq('equipment_id', selectedEquipment).eq('booking_date', bookingDate).in('status', ['confirmed', 'pending']);
        document.querySelectorAll('.time-slot').forEach(el => {
          el.classList.remove('booked');
          el.style.opacity = '1';
          el.style.cursor = 'pointer';
          const st = el.querySelector('.slot-status');
          if (st && !el.classList.contains('selected')) st.textContent = '鉁?鍙绾?;
        });
        if (data) {
          data.forEach(b => {
            const startStr = b.start_time ? b.start_time.substring(0,5) : '';
            const endStr = b.end_time ? b.end_time.substring(0,5) : '';
            const bookedTime = startStr + '-' + endStr;
            document.querySelectorAll('.time-slot').forEach(el => {
              const slotTime = el.querySelector('.slot-time').textContent;
              if (slotTime === bookedTime) {
                el.classList.add('booked');
                el.style.opacity = '0.5';
                el.style.cursor = 'not-allowed';
                const st = el.querySelector('.slot-status');
                if (st) st.textContent = '脳 宸茶 ' + b.username + ' 棰勭害';
              }
            });
          });
        }
      } catch (e) { console.error('Check bookings error:', e); }
    }

    function updateSubmitBtn() {
      const btn = document.getElementById('submitBtn');
      if (selectedEquipment && selectedSlot) {
        btn.disabled = false;
        btn.textContent = '纭棰勭害';
      } else {
        btn.disabled = true;
        btn.textContent = '璇峰厛閫夋嫨鍣ㄦ鍜屾椂娈?;
      }
    }

    async function submitBooking() {
      if (!selectedEquipment || !selectedSlot || !supabaseClient) return;
      const bookingDate = document.getElementById('bookingDate').value;
      try {
        const startParts = selectedSlot.start.split(':');
        const endH = parseInt(startParts[0]) + 1;
        const endTime = String(endH).padStart(2,'0') + ':' + startParts[1];

        const { data: existing } = await supabaseClient.from('gym_bookings').select('id').eq('equipment_id', selectedEquipment).eq('booking_date', bookingDate).in('status', ['confirmed', 'pending']).gte('start_time', selectedSlot.start).lte('end_time', endTime);
        if (existing && existing.length > 0) {
          showBookingMsg('璇ユ椂娈靛凡琚绾?, 'error');
          return;
        }

        const { error } = await supabaseClient.from('gym_bookings').insert({
          user_id: currentUser.id, username: currentUser.username,
          equipment_id: selectedEquipment, booking_date: bookingDate,
          start_time: selectedSlot.start, end_time: endTime, status: 'confirmed'
        });
        if (error) throw error;

        showBookingMsg('棰勭害鎴愬姛锛?, 'success');
        selectedEquipment = null;
        selectedSlot = null;
        document.querySelectorAll('.equipment-option').forEach(el => el.classList.remove('selected'));
        renderTimeSlots();
        updateSubmitBtn();
      } catch (e) { showBookingMsg('棰勭害澶辫触: ' + e.message, 'error'); }
    }

    function showBookingMsg(msg, type) {
      const el = document.getElementById('bookingMessage');
      el.className = 'message ' + type;
      el.textContent = msg;
      setTimeout(() => { el.className = 'message'; }, 5000);
    }

    async function loadAnalytics() {
      if (!supabaseClient) return;
      try {
        const today = new Date().toISOString().split('T')[0];
        const { data } = await supabaseClient.from('gym_history').select('*').gte('create_time', today + 'T00:00:00').order('create_time', { ascending: true });
        if (!data || data.length === 0) return;

        const peopleByHour = {};
        const eq1ByHour = {};
        const eq2ByHour = {};
        for (let i = 0; i < 24; i++) { peopleByHour[i] = []; eq1ByHour[i] = 0; eq2ByHour[i] = 0; }

        data.forEach(r => {
          const h = new Date(r.create_time).getHours();
          peopleByHour[h].push(r.current_people);
        });

        const eq1First = {}, eq1Last = {}, eq2First = {}, eq2Last = {};
        data.forEach(r => {
          const h = new Date(r.create_time).getHours();
          if (!(h in eq1First)) { eq1First[h] = r.equipment1_count; eq1Last[h] = r.equipment1_count; }
          eq1Last[h] = r.equipment1_count;
          if (!(h in eq2First)) { eq2First[h] = r.equipment2_count; eq2Last[h] = r.equipment2_count; }
          eq2Last[h] = r.equipment2_count;
        });
        Object.keys(eq1Last).forEach(h => { eq1ByHour[h] = eq1Last[h] - eq1First[h]; });
        Object.keys(eq2Last).forEach(h => { eq2ByHour[h] = eq2Last[h] - eq2First[h]; });

        const avgPeopleArr = [];
        const peopleLabels = [];
        for (let i = 0; i < 24; i++) {
          peopleLabels.push(i + ':00');
          if (peopleByHour[i].length > 0) {
            avgPeopleArr.push(peopleByHour[i].reduce((a,b) => a+b, 0) / peopleByHour[i].length);
          } else { avgPeopleArr.push(0); }
        }

        const eq1Arr = Object.keys(eq1ByHour).sort((a,b) => a-b).map(h => eq1ByHour[h]);
        const eq2Arr = Object.keys(eq2ByHour).sort((a,b) => a-b).map(h => eq2ByHour[h]);

        const ctx1 = document.getElementById('peopleChart').getContext('2d');
        if (peopleChart) peopleChart.destroy();
        peopleChart = new Chart(ctx1, {
          type: 'line',
          data: { labels: peopleLabels, datasets: [{ label: '浜烘暟', data: avgPeopleArr, borderColor: '#3498db', backgroundColor: 'rgba(52,152,219,.1)', fill: true, tension: .4 }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        const totalEq1 = Object.values(eq1ByHour).reduce((a,b) => a+b, 0);
        const totalEq2 = Object.values(eq2ByHour).reduce((a,b) => a+b, 0);
        const ctx2 = document.getElementById('equipmentChart').getContext('2d');
        if (equipmentChart) equipmentChart.destroy();
        equipmentChart = new Chart(ctx2, {
          type: 'bar',
          data: { labels: ['鍣ㄦ1', '鍣ㄦ2'], datasets: [{ label: '浣跨敤娆℃暟', data: [totalEq1, totalEq2], backgroundColor: ['#3498db', '#2ecc71'], borderRadius: 8 }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });

        const nonZero = avgPeopleArr.filter(v => v > 0);
        const avg = nonZero.length > 0 ? (nonZero.reduce((a,b) => a+b, 0) / nonZero.length).toFixed(1) : 0;
        const maxP = Math.max(...avgPeopleArr, 0);
        document.getElementById('a-avgPeople').textContent = avg;
        document.getElementById('a-maxPeople').textContent = maxP;
        document.getElementById('a-totalBookings').textContent = totalEq1 + totalEq2;

        const sorted = avgPeopleArr.map((v, i) => ({ hour: i, avg: v })).filter(x => x.avg > 0).sort((a,b) => b.avg - a.avg);
        if (sorted.length > 0) {
          document.getElementById('a-peakHour').textContent = sorted[0].hour + ':00';
          document.getElementById('peakHoursInfo').innerHTML = sorted.slice(0, 3).map(h => `<p><span class="peak">${h.hour}:00</span> - 骞冲潎 ${h.avg.toFixed(1)} 浜?/p>`).join('');
          document.getElementById('quietHoursInfo').innerHTML = sorted.slice(-3).reverse().map(h => `<p><span class="quiet">${h.hour}:00</span> - 骞冲潎 ${h.avg.toFixed(1)} 浜?/p>`).join('');
        }
      } catch (e) { console.error('Load analytics error:', e); }
    }

    async function loadHistory() {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient.from('gym_history').select('*').order('create_time', { ascending: false }).limit(100);
        if (error) throw error;
        const tbody = document.getElementById('historyTableBody');
        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="no-data">鏆傛棤鍘嗗彶璁板綍</td></tr>';
          return;
        }
        tbody.innerHTML = data.map(r => `<tr>
          <td>${new Date(r.create_time).toLocaleString('zh-CN')}</td>
          <td>${r.current_people}</td>
          <td>${r.temperature !== null ? r.temperature + '鈩? : '--'}</td>
          <td>${r.humidity !== null ? r.humidity + '%' : '--'}</td>
          <td class="${r.equipment1 ? 'status-on' : 'status-off'}">${r.equipment1 ? '鍗犵敤' : '绌洪棽'}</td>
          <td class="${r.equipment2 ? 'status-on' : 'status-off'}">${r.equipment2 ? '鍗犵敤' : '绌洪棽'}</td>
          <td>${r.equipment1_count}</td>
          <td>${r.equipment2_count}</td>
        </tr>`).join('');
      } catch (e) { console.error('Load history error:', e); }
    }

    async function loadAdminBookings() {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient.from('gym_bookings').select('*').in('status', ['confirmed', 'pending']).order('booking_date', { ascending: true });
        if (error) throw error;
        const el = document.getElementById('admin-bookings');
        if (!data || data.length === 0) { el.innerHTML = '<div class="no-data">鏆傛棤棰勭害璁板綍</div>'; return; }
        el.innerHTML = `<table class="data-table"><thead><tr><th>鐢ㄦ埛</th><th>鍣ㄦ</th><th>鏃ユ湡</th><th>鏃舵</th><th>鐘舵€?/th><th>鎿嶄綔</th></tr></thead><tbody>
          ${data.map(b => `<tr>
            <td>${b.username}</td><td>鍣ㄦ${b.equipment_id}</td><td>${b.booking_date}</td>
            <td>${b.start_time ? b.start_time.substring(0,5) : '--'}-${b.end_time ? b.end_time.substring(0,5) : '--'}</td>
            <td style="color:${b.status === 'confirmed' ? '#27ae60' : '#e74c3c'}">${b.status}</td>
            <td><button class="btn btn-red btn-sm" onclick="adminCancelBooking(${b.id})">鍙栨秷</button></td>
          </tr>`).join('')}</tbody></table>`;
      } catch (e) { console.error('Load admin bookings error:', e); }
    }

    async function adminCancelBooking(id) {
      if (!confirm('纭畾鍙栨秷姝ら绾︼紵')) return;
      try {
        await supabaseClient.from('gym_bookings').update({ status: 'cancelled' }).eq('id', id);
        loadAdminBookings();
      } catch (e) { alert('鍙栨秷澶辫触: ' + e.message); }
    }

    async function loadAdminUsers() {
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient.from('gym_users').select('*').order('create_time', { ascending: false });
        if (error) throw error;
        const el = document.getElementById('admin-users');
        if (!data || data.length === 0) { el.innerHTML = '<div class="no-data">鏆傛棤鐢ㄦ埛</div>'; return; }
        el.innerHTML = `<table class="data-table"><thead><tr><th>ID</th><th>鐢ㄦ埛鍚?/th><th>瑙掕壊</th><th>鎵嬫満</th><th>閭</th><th>娉ㄥ唽鏃堕棿</th><th>鎿嶄綔</th></tr></thead><tbody>
          ${data.map(u => `<tr>
            <td>${u.id}</td><td>${u.username}${u.username === 'admin' ? ' <span style="color:#e74c3c;font-size:12px;">(榛樿)</span>' : ''}</td>
            <td style="color:${u.role === 'admin' ? '#e74c3c' : '#3498db'};font-weight:bold;">${u.role === 'admin' ? '绠＄悊鍛? : '鏅€氱敤鎴?}</td>
            <td>${u.phone || '--'}</td><td>${u.email || '--'}</td>
            <td>${u.create_time ? new Date(u.create_time).toLocaleString('zh-CN') : '--'}</td>
            <td>${u.username !== 'admin' ? `<button class="btn btn-blue btn-sm" onclick="toggleRole(${u.id},'${u.role}')">${u.role === 'admin' ? '闄嶄负鐢ㄦ埛' : '鍗囦负绠＄悊鍛?}</button> ${u.username !== currentUser.username ? `<button class="btn btn-red btn-sm" onclick="deleteUser(${u.id},'${u.username}')">鍒犻櫎</button>` : ''}` : '<span style="color:#999;">涓嶅彲淇敼</span>'}</td>
          </tr>`).join('')}</tbody></table>`;
      } catch (e) { console.error('Load admin users error:', e); }
    }

    async function toggleRole(userId, currentRole) {
      const newRole = currentRole === 'admin' ? 'user' : 'admin';
      if (!confirm(`纭畾瑕?{currentRole === 'admin' ? '闄嶇骇' : '鍗囩骇'}璇ョ敤鎴峰悧锛焋)) return;
      try {
        await supabaseClient.from('gym_users').update({ role: newRole }).eq('id', userId);
        loadAdminUsers();
      } catch (e) { alert('鎿嶄綔澶辫触: ' + e.message); }
    }

    async function deleteUser(userId, username) {
      if (!confirm(`纭畾瑕佸垹闄ょ敤鎴?"${username}" 鍚楋紵璇ユ搷浣滀笉鍙仮澶嶏紒`)) return;
      try {
        await supabaseClient.from('gym_bookings').delete().eq('user_id', userId);
        await supabaseClient.from('gym_users').delete().eq('id', userId);
        loadAdminUsers();
      } catch (e) { alert('鍒犻櫎澶辫触: ' + e.message); }
    }

    async function loadAdminAnalytics() {
      if (!supabaseClient) return;
      try {
        const today = new Date().toISOString().split('T')[0];
        const { data } = await supabaseClient.from('gym_history').select('*').gte('create_time', today + 'T00:00:00');
        const el = document.getElementById('admin-analytics');
        if (!data || data.length === 0) { el.innerHTML = '<div class="no-data">浠婃棩鏆傛棤鏁版嵁</div>'; return; }
        const avgPeople = data.reduce((s, r) => s + r.current_people, 0) / data.length;
        const maxPeople = Math.max(...data.map(r => r.current_people));
        el.innerHTML = `<div class="stats-grid">
          <div class="stat-card"><div class="stat-value">${avgPeople.toFixed(1)}</div><div class="stat-label">浠婃棩骞冲潎浜烘暟</div></div>
          <div class="stat-card"><div class="stat-value">${maxPeople}</div><div class="stat-label">浠婃棩宄板€间汉鏁?/div></div>
          <div class="stat-card"><div class="stat-value">${data.length}</div><div class="stat-label">浠婃棩鏁版嵁鏉℃暟</div></div>
        </div>`;
      } catch (e) { console.error('Load admin analytics error:', e); }
    }

    window.addEventListener('load', () => {
      const hasConfig = initSupabase();
      if (!hasConfig) {
        currentUser = { id: 0, username: '__setup__', role: 'admin' };
        showApp();
        navigate('settings');
      }
    });
  </script>
</body>
</html>
